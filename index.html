<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE-GAME</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <section>
            <div class="scores">
                <div class="info">
                    <h3>HIGH SCORE:
                        <span class="high-score">0</span>
                        
                    </h3>
                </div>
                <div class="result">
                    <h3> SCORE:
                        <span class="score"> 7 </span>
                    </h3>
                </div>
                <div class="time">
                    <h3>TIME REMAIN:
                        <span class="remaintime"></span>
                    </h3>
                </div>
                
            </div>
            <div class="play">
              <button>PAUSE</button>
            </div>
            <div class="board">


            </div>
        </section>
<div class="welcome">
  <div class="welcomegame">

      <h3 class="welcome-heading">WELCOME TO SNAKE GAME</h3>
<h5></h5>
<select id="difficulty">
    <option value="" selected hidden>SELECT DIFFICULTY</option>
    <option value="EASY" >EASY</option>
    <option value="MEDIUM">MEDIUM</option>    
    <option value="HARD">HARD</option>
</select>


<button class="btn btn-start">START</button>

  </div>
</div>
  
        <div class="gameover">
            <h3 class="welcome-heading"> GAME OVER </h3>
            <button class="btn btn-end">RESTART</button>

        </div>
    </main>


    <script src="script.js"></script>
</body>

</html>
